<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Q&A サポート</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;500;700&family=Shippori+Mincho:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f14;
  --surface: #17171f;
  --surface2: #1e1e28;
  --border: #2a2a38;
  --border2: #353548;
  --text: #e8e6f0;
  --muted: #7a7890;
  --accent: #7c6af5;
  --accent2: #a594ff;
  --gold: #d4a853;
  --gold2: #f0c97a;
  --green: #4caf88;
  --red: #e07070;
  --radius: 14px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Zen Kaku Gothic New', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-weight: 300;
}
.nav {
  display: flex;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  position: sticky; top: 0; z-index: 100;
}
.nav-logo {
  font-family: 'Shippori Mincho', serif;
  font-size: 15px;
  color: var(--gold2);
  padding: 16px 20px 16px 0;
  border-right: 1px solid var(--border);
  margin-right: 16px;
  letter-spacing: .05em;
}
.nav-tab {
  padding: 16px 18px;
  background: none; border: none;
  color: var(--muted);
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-size: 13px; font-weight: 400;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all .2s;
  position: relative;
}
.nav-tab.active { color: var(--accent2); border-bottom-color: var(--accent); }
.badge {
  position: absolute; top: 10px; right: 8px;
  background: var(--red); color: #fff;
  font-size: 10px; width: 16px; height: 16px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700;
}
.panel { display: none; }
.panel.active { display: block; }

/* LOADING OVERLAY */
.loading-overlay {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  z-index: 999; flex-direction: column; gap: 16px;
}
.loading-overlay p { font-size: 13px; color: var(--muted); }
.spinner {
  width: 36px; height: 36px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* STUDENT */
.student-wrap { max-width: 660px; margin: 0 auto; padding: 36px 20px 80px; }
.s-hero { margin-bottom: 32px; }
.s-hero h1 {
  font-family: 'Shippori Mincho', serif;
  font-size: 24px; font-weight: 600; margin-bottom: 8px;
  background: linear-gradient(135deg, var(--gold2), var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.s-hero p { font-size: 13px; color: var(--muted); line-height: 1.8; }
.search-area {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  overflow: hidden; margin-bottom: 28px;
}
.search-inner {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px; border-bottom: 1px solid var(--border);
}
.search-inner input {
  flex: 1; background: none; border: none; outline: none;
  color: var(--text); font-family: 'Zen Kaku Gothic New', sans-serif;
  font-size: 14px; font-weight: 300;
}
.search-inner input::placeholder { color: var(--muted); }
.search-hint { padding: 10px 16px; font-size: 11px; color: var(--muted); display: flex; gap: 12px; flex-wrap: wrap; }
.search-hint span { cursor: pointer; transition: color .2s; }
.search-hint span:hover { color: var(--accent2); }
.result-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden; margin-bottom: 10px;
  transition: border-color .2s; animation: fadeUp .25s ease;
}
.result-card:hover { border-color: var(--border2); }
.result-q {
  padding: 14px 18px; font-size: 13px; font-weight: 500;
  display: flex; justify-content: space-between; align-items: center;
  cursor: pointer; gap: 12px;
}
.cat-tag {
  font-size: 11px; background: rgba(124,106,245,.15); color: var(--accent2);
  padding: 3px 8px; border-radius: 20px; white-space: nowrap; flex-shrink: 0;
}
.result-a {
  display: none; padding: 14px 18px 16px; font-size: 13px; line-height: 1.85;
  color: #b8b6c8; border-top: 1px solid var(--border);
}
.result-card.open .result-a { display: block; }
.result-card.open .result-q { color: var(--accent2); }
.toggle-icon { color: var(--muted); font-size: 18px; transition: transform .2s; flex-shrink: 0; }
.result-card.open .toggle-icon { transform: rotate(45deg); color: var(--accent2); }
@keyframes fadeUp { from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)} }
.no-result {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 28px 20px; text-align: center; margin-bottom: 28px;
}
.no-result p { font-size: 13px; color: var(--muted); margin-bottom: 16px; }
.section-title { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
.filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
.filter-btn {
  background: var(--surface); border: 1px solid var(--border); color: var(--muted);
  border-radius: 20px; padding: 5px 12px; font-size: 12px; cursor: pointer;
  transition: all .2s; font-family: 'Zen Kaku Gothic New', sans-serif;
}
.filter-btn.active, .filter-btn:hover { background: rgba(124,106,245,.15); border-color: var(--accent); color: var(--accent2); }
.post-section {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px; margin-top: 28px;
}
.post-section h3 {
  font-size: 13px; color: var(--muted); margin-bottom: 14px;
  display: flex; align-items: center; gap: 8px;
}
.post-section h3::before { content:''; width:3px; height:14px; background:var(--accent); border-radius:2px; display:block; }
.field { margin-bottom: 12px; }
.field label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 6px; letter-spacing: .05em; }
.field input, .field textarea {
  width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
  padding: 10px 14px; color: var(--text); font-family: 'Zen Kaku Gothic New', sans-serif;
  font-size: 13px; font-weight: 300; outline: none; transition: border-color .2s;
}
.field input:focus, .field textarea:focus { border-color: var(--accent); }
.field textarea { resize: vertical; min-height: 80px; }
.btn-submit {
  width: 100%; background: var(--accent); color: #fff; border: none;
  border-radius: 10px; padding: 12px; font-family: 'Zen Kaku Gothic New', sans-serif;
  font-size: 13px; font-weight: 500; cursor: pointer; transition: all .2s; letter-spacing: .05em;
}
.btn-submit:hover { background: #6a58e0; transform: translateY(-1px); }
.btn-submit:disabled { background: var(--border); color: var(--muted); transform: none; cursor: not-allowed; }
.pending-card {
  background: var(--surface); border: 1px solid var(--border);
  border-left: 3px solid var(--gold); border-radius: var(--radius);
  padding: 16px 18px; margin-bottom: 10px; animation: fadeUp .25s ease;
}
.pending-label { font-size: 11px; color: var(--gold); margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
.pending-label::before { content:'●'; animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:.3} }
.pending-q { font-size: 13px; font-weight: 500; margin-bottom: 4px; }
.pending-meta { font-size: 11px; color: var(--muted); }

/* ADMIN */
.admin-wrap { max-width: 820px; margin: 0 auto; padding: 32px 20px 80px; }
.admin-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
.admin-head h2 { font-family: 'Shippori Mincho', serif; font-size: 18px; font-weight: 600; }
.stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 28px; }
.stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; text-align: center; }
.stat-n {
  font-family: 'Shippori Mincho', serif; font-size: 26px; font-weight: 600;
  background: linear-gradient(135deg, var(--gold2), var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.stat-l { font-size: 11px; color: var(--muted); margin-top: 4px; }
.pending-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 24px; }
.pending-section-head { padding: 14px 18px; border-bottom: 1px solid var(--border); font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 8px; color: var(--gold2); }
.admin-pending-item { padding: 16px 18px; border-bottom: 1px solid var(--border); }
.admin-pending-item:last-child { border-bottom: none; }
.apq { font-size: 13px; font-weight: 500; margin-bottom: 6px; }
.apmeta { font-size: 11px; color: var(--muted); margin-bottom: 12px; }
.answer-field textarea {
  width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
  padding: 10px 14px; color: var(--text); font-family: 'Zen Kaku Gothic New', sans-serif;
  font-size: 13px; font-weight: 300; outline: none; resize: vertical; min-height: 70px;
  transition: border-color .2s; margin-bottom: 8px;
}
.answer-field textarea:focus { border-color: var(--accent); }
.answer-row { display: flex; gap: 8px; align-items: center; }
.answer-row input {
  flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
  padding: 8px 12px; color: var(--text); font-family: 'Zen Kaku Gothic New', sans-serif;
  font-size: 12px; outline: none;
}
.answer-row input:focus { border-color: var(--accent); }
.btn-answer {
  background: var(--green); color: #fff; border: none; border-radius: 8px;
  padding: 9px 18px; font-size: 12px; font-weight: 500; cursor: pointer;
  font-family: 'Zen Kaku Gothic New', sans-serif; transition: all .2s; white-space: nowrap;
}
.btn-answer:hover { background: #3a9e76; }
.btn-answer:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }
.btn-dismiss {
  background: none; border: 1px solid var(--border); color: var(--muted);
  border-radius: 8px; padding: 9px 14px; font-size: 12px; cursor: pointer;
  font-family: 'Zen Kaku Gothic New', sans-serif; transition: all .2s;
}
.btn-dismiss:hover { border-color: var(--red); color: var(--red); }
.qa-section-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.admin-qa-item {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 16px 18px; margin-bottom: 8px; display: flex; gap: 14px; align-items: flex-start;
}
.admin-qa-content { flex: 1; min-width: 0; }
.admin-qa-cat { font-size: 11px; color: var(--accent2); margin-bottom: 4px; }
.admin-qa-q { font-size: 13px; font-weight: 500; margin-bottom: 5px; }
.admin-qa-a { font-size: 12px; color: var(--muted); line-height: 1.6; }
.btn-del {
  background: none; border: 1px solid var(--border); color: var(--muted);
  width: 30px; height: 30px; border-radius: 8px; cursor: pointer; font-size: 13px;
  display: flex; align-items: center; justify-content: center; transition: all .2s; flex-shrink: 0;
}
.btn-del:hover { background: rgba(224,112,112,.1); border-color: var(--red); color: var(--red); }
.empty {
  text-align: center; padding: 32px; color: var(--muted); font-size: 13px;
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
}
.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--surface2); border: 1px solid var(--border2);
  color: var(--text); padding: 10px 20px; border-radius: 24px;
  font-size: 13px; transition: transform .3s; z-index: 998; white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }
@media(max-width:600px){
  .stats { grid-template-columns: repeat(2,1fr); }
  .answer-row { flex-wrap: wrap; }
}
</style>
</head>
<body>

<div class="loading-overlay" id="loading-overlay">
  <div class="spinner"></div>
  <p>読み込み中...</p>
</div>

<div class="nav">
  <div class="nav-logo">サポートQ&A</div>
  <button class="nav-tab active" onclick="switchPanel('student',this)">質問する</button>
  <button class="nav-tab" onclick="switchPanel('admin',this)">
    先生ページ
    <span class="badge" id="badge" style="display:none">0</span>
  </button>
</div>

<!-- STUDENT -->
<div id="panel-student" class="panel active">
  <div class="student-wrap">
    <div class="s-hero">
      <h1>何でも聞いてください</h1>
      <p>まずキーワードで検索してみてください。同じ質問への回答が見つかることがあります。<br>見つからなければ、先生に直接質問を送れます。</p>
    </div>
    <div class="search-area">
      <div class="search-inner">
        <span style="color:var(--muted);font-size:16px">🔍</span>
        <input type="text" id="search-input" placeholder="キーワードや質問を入力..." oninput="doSearch()">
      </div>
      <div class="search-hint" id="cat-hints"></div>
    </div>
    <div id="search-results-area"></div>
    <div id="all-faq-section">
      <div style="margin-bottom:14px"><span class="section-title">回答済みQ&A一覧</span></div>
      <div class="filter-row" id="filter-row"></div>
      <div id="faq-list"></div>
    </div>
    <div id="my-pending-section" style="margin-top:24px"></div>
    <div class="post-section" id="post-form">
      <h3>先生に質問を送る</h3>
      <div class="field">
        <label>お名前（任意）</label>
        <input type="text" id="s-name" placeholder="例：田中">
      </div>
      <div class="field">
        <label>質問内容</label>
        <textarea id="s-question" placeholder="わからないことや気になることを書いてください"></textarea>
      </div>
      <button class="btn-submit" id="submit-btn" onclick="postQuestion()">質問を送る →</button>
    </div>
  </div>
</div>

<!-- ADMIN -->
<div id="panel-admin" class="panel">
  <div class="admin-wrap">
    <div class="admin-head"><h2>管理パネル</h2></div>
    <div class="stats">
      <div class="stat"><div class="stat-n" id="st-qa">0</div><div class="stat-l">回答済みQ&A</div></div>
      <div class="stat"><div class="stat-n" id="st-pending">0</div><div class="stat-l">未回答の質問</div></div>
      <div class="stat"><div class="stat-n" id="st-cats">0</div><div class="stat-l">カテゴリ数</div></div>
      <div class="stat"><div class="stat-n" id="st-week">0</div><div class="stat-l">今週の質問</div></div>
    </div>
    <div class="pending-section">
      <div class="pending-section-head">⏳ 未回答の質問</div>
      <div id="admin-pending-list"></div>
    </div>
    <div class="qa-section-head"><span class="section-title">回答済みQ&A</span></div>
    <div id="admin-qa-list"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, collection, addDoc, getDocs, doc, deleteDoc,
  onSnapshot, query, orderBy, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDFdHh97IszaKndCBemZM7yxU-44ejcb_8",
  authDomain: "munenagadiet.firebaseapp.com",
  projectId: "munenagadiet",
  storageBucket: "munenagadiet.firebasestorage.app",
  messagingSenderId: "862750478656",
  appId: "1:862750478656:web:177bd1c80e8889c7286aa5"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let qaList = [];
let pendingList = [];
let activeFilter = 'all';

// ======= REALTIME LISTENERS =======
function startListeners() {
  // QA
  onSnapshot(query(collection(db, 'qa'), orderBy('date', 'desc')), snap => {
    qaList = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderStudent();
    renderAdminQA();
    updateBadge();
  });

  // Pending
  onSnapshot(query(collection(db, 'pending'), orderBy('date', 'desc')), snap => {
    pendingList = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    updateBadge();
    renderAdminPending();
    renderMyPending();
    document.getElementById('loading-overlay').style.display = 'none';
  });
}

// ======= TABS =======
window.switchPanel = function(name, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'admin') renderAdmin();
};

// ======= SEARCH =======
window.doSearch = function() {
  const q = document.getElementById('search-input').value.trim();
  const area = document.getElementById('search-results-area');
  const faqSec = document.getElementById('all-faq-section');
  if (!q) { area.innerHTML = ''; faqSec.style.display = ''; return; }

  const kw = q.toLowerCase();
  const hits = qaList.filter(item =>
    item.question?.toLowerCase().includes(kw) ||
    item.answer?.toLowerCase().includes(kw) ||
    item.category?.toLowerCase().includes(kw)
  );

  if (hits.length > 0) {
    faqSec.style.display = 'none';
    area.innerHTML = `
      <div style="margin-bottom:12px"><span class="section-title">${hits.length}件見つかりました</span></div>
      ${hits.map(i => rcHTML(i)).join('')}
      <div style="text-align:center;margin-top:16px">
        <span style="font-size:12px;color:var(--muted)">求める回答が見つかりませんか？</span>
        <button onclick="clearSearch()" style="background:none;border:none;color:var(--accent2);font-size:12px;cursor:pointer;margin-left:8px;font-family:inherit">先生に質問する →</button>
      </div>`;
  } else {
    faqSec.style.display = 'none';
    area.innerHTML = `
      <div class="no-result">
        <p>「${q}」に関する回答がまだありません</p>
        <button class="btn-submit" onclick="prefill('${q.replace(/'/g,"\\'")}')">この内容で質問を送る →</button>
      </div>`;
  }
};

window.clearSearch = function() {
  document.getElementById('search-input').value = '';
  document.getElementById('search-results-area').innerHTML = '';
  document.getElementById('all-faq-section').style.display = '';
  document.getElementById('post-form').scrollIntoView({ behavior:'smooth' });
};

window.prefill = function(q) {
  document.getElementById('s-question').value = q;
  document.getElementById('search-input').value = '';
  document.getElementById('search-results-area').innerHTML = '';
  document.getElementById('all-faq-section').style.display = '';
  document.getElementById('post-form').scrollIntoView({ behavior:'smooth' });
};

function rcHTML(item) {
  return `<div class="result-card" onclick="this.classList.toggle('open')">
    <div class="result-q">
      <span>${item.question}</span>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="cat-tag">${item.category || '一般'}</span>
        <span class="toggle-icon">+</span>
      </div>
    </div>
    <div class="result-a">${item.answer}</div>
  </div>`;
}

// ======= STUDENT RENDER =======
function renderStudent() {
  const cats = [...new Set(qaList.map(d => d.category).filter(Boolean))];

  document.getElementById('cat-hints').innerHTML = cats.slice(0,6).map(c =>
    `<span onclick="document.getElementById('search-input').value='${c}';doSearch()">${c}</span>`
  ).join('');

  document.getElementById('filter-row').innerHTML =
    `<button class="filter-btn ${activeFilter==='all'?'active':''}" onclick="setFilter('all')">すべて</button>` +
    cats.map(c => `<button class="filter-btn ${activeFilter===c?'active':''}" onclick="setFilter('${c}')">${c}</button>`).join('');

  const filtered = activeFilter==='all' ? qaList : qaList.filter(d => d.category===activeFilter);
  document.getElementById('faq-list').innerHTML = filtered.length
    ? filtered.map(i => rcHTML(i)).join('')
    : '<div class="empty">まだ回答済みQ&Aはありません</div>';
}

window.setFilter = function(cat) { activeFilter = cat; renderStudent(); };

function renderMyPending() {
  const sec = document.getElementById('my-pending-section');
  if (!pendingList.length) { sec.innerHTML = ''; return; }
  sec.innerHTML = `
    <div style="margin-bottom:12px"><span class="section-title">回答待ちの質問</span></div>
    ${pendingList.map(p => `
      <div class="pending-card">
        <div class="pending-label">回答待ち</div>
        <div class="pending-q">${p.question}</div>
        <div class="pending-meta">${p.name || '匿名'} · ${fmt(p.date)}</div>
      </div>`).join('')}`;
}

// ======= POST QUESTION =======
window.postQuestion = async function() {
  const name = document.getElementById('s-name').value.trim();
  const q = document.getElementById('s-question').value.trim();
  if (!q) { showToast('質問内容を入力してください'); return; }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = '送信中...';

  try {
    await addDoc(collection(db, 'pending'), {
      name: name || '匿名',
      question: q,
      date: serverTimestamp()
    });
    document.getElementById('s-name').value = '';
    document.getElementById('s-question').value = '';
    showToast('✅ 質問を送りました！先生の回答をお待ちください');
  } catch(e) {
    showToast('エラーが発生しました。もう一度お試しください');
  }

  btn.disabled = false;
  btn.textContent = '質問を送る →';
};

// ======= ADMIN =======
function renderAdmin() {
  renderAdminPending();
  renderAdminQA();
  renderStats();
}

function renderStats() {
  const cats = [...new Set(qaList.map(d => d.category).filter(Boolean))];
  const weekAgo = Date.now() - 86400000*7;
  document.getElementById('st-qa').textContent = qaList.length;
  document.getElementById('st-pending').textContent = pendingList.length;
  document.getElementById('st-cats').textContent = cats.length;
  document.getElementById('st-week').textContent = pendingList.filter(d => {
    if (!d.date) return false;
    const ms = d.date.toMillis ? d.date.toMillis() : d.date;
    return ms > weekAgo;
  }).length;
}

function renderAdminPending() {
  renderStats();
  const pl = document.getElementById('admin-pending-list');
  if (!pl) return;

  const cats = [...new Set(qaList.map(d => d.category).filter(Boolean))];
  const existing = document.getElementById('cat-dl');
  if (existing) existing.remove();
  const dl = document.createElement('datalist');
  dl.id = 'cat-dl';
  dl.innerHTML = cats.map(c => `<option value="${c}">`).join('');
  document.body.appendChild(dl);

  pl.innerHTML = pendingList.length
    ? pendingList.map(p => `
        <div class="admin-pending-item" id="pitem-${p.id}">
          <div class="apq">${p.question}</div>
          <div class="apmeta">${p.name || '匿名'} · ${fmt(p.date)}</div>
          <div class="answer-field">
            <textarea id="ans-${p.id}" placeholder="回答を入力してください..."></textarea>
            <div class="answer-row">
              <input type="text" id="cat-${p.id}" placeholder="カテゴリ（例：基礎、実践方法...）" list="cat-dl">
              <button class="btn-answer" onclick="answerQ('${p.id}')">回答して保存</button>
              <button class="btn-dismiss" onclick="dismissQ('${p.id}')">削除</button>
            </div>
          </div>
        </div>`).join('')
    : '<div style="padding:20px;text-align:center;font-size:13px;color:var(--muted)">未回答の質問はありません 🎉</div>';
}

function renderAdminQA() {
  const ql = document.getElementById('admin-qa-list');
  if (!ql) return;
  renderStats();
  ql.innerHTML = qaList.length
    ? qaList.map(item => `
        <div class="admin-qa-item">
          <div class="admin-qa-content">
            <div class="admin-qa-cat">${item.category || '一般'}</div>
            <div class="admin-qa-q">${item.question}</div>
            <div class="admin-qa-a">${(item.answer||'').length>100?(item.answer).slice(0,100)+'…':item.answer}</div>
          </div>
          <button class="btn-del" onclick="deleteQA('${item.id}')">🗑</button>
        </div>`).join('')
    : '<div class="empty">回答済みQ&Aはまだありません</div>';
}

window.answerQ = async function(id) {
  const ans = document.getElementById('ans-'+id)?.value.trim();
  const cat = document.getElementById('cat-'+id)?.value.trim() || '一般';
  const p = pendingList.find(x => x.id===id);
  if (!ans) { showToast('回答を入力してください'); return; }
  if (!p) return;

  const btn = document.querySelector(`#pitem-${id} .btn-answer`);
  if (btn) { btn.disabled = true; btn.textContent = '保存中...'; }

  try {
    await addDoc(collection(db, 'qa'), {
      category: cat,
      question: p.question,
      answer: ans,
      date: serverTimestamp()
    });
    await deleteDoc(doc(db, 'pending', id));
    showToast('✅ 回答を保存しました');
  } catch(e) {
    showToast('エラーが発生しました');
    if (btn) { btn.disabled = false; btn.textContent = '回答して保存'; }
  }
};

window.dismissQ = async function(id) {
  if (!confirm('この質問を削除しますか？')) return;
  await deleteDoc(doc(db, 'pending', id));
};

window.deleteQA = async function(id) {
  if (!confirm('このQ&Aを削除しますか？')) return;
  await deleteDoc(doc(db, 'qa', id));
};

// ======= UTILS =======
function updateBadge() {
  const b = document.getElementById('badge');
  b.style.display = pendingList.length ? 'flex' : 'none';
  b.textContent = pendingList.length;
}

function fmt(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// INIT
startListeners();
</script>
</body>
</html>
